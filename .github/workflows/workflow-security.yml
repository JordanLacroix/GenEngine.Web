name: Workflow security

on:
  push:
    branches: [main]
    paths:
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
  schedule:
    - cron: '41 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-security:
    name: Workflow security
    permissions:
      checks: write # Required by reviewdog to publish the actionlint check.
      contents: read
      security-events: write # Required to upload zizmor SARIF results.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint GitHub Actions
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error

      - name: Audit workflows with zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 1.27.0
          persona: pedantic
          min-severity: low
          min-confidence: medium
          advanced-security: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          annotations: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
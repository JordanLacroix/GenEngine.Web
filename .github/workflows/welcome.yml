name: Welcome contributors

on:
  issues:
    types: [opened]
  pull_request_target: # zizmor: ignore[dangerous-triggers] No checkout or execution of PR-controlled code.
    types: [opened, reopened]

permissions:
  contents: read

concurrency:
  group: welcome-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    name: First interaction
    permissions:
      issues: write # Required to post the first-issue welcome message.
      pull-requests: write # Required to post the first-PR welcome message.
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Welcome first-time contributors
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: >-
            Merci pour ce premier signalement. La structure du formulaire nous permettra de le qualifier rapidement.
          pr_message: >-
            Merci pour cette première contribution. Les contrôles automatisés vont maintenant vérifier le changement.

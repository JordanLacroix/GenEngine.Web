<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Composition abstraite : une onde de résonance traverse une trame de données, nette au centre et brouillée sur les bords.">
  <title>Résonance</title>
  <desc>
    Composition abstraite pour « Le Diapason ». Un diapason stylisé émet des ondes qui
    traversent une trame de points : au centre les points sont alignés et lisibles, en
    périphérie ils se dispersent. L'image ne représente aucun lieu et aucun personnage —
    elle figure la lucidité face à une information qui paraît ordonnée.
  </desc>

  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#0d2032"/>
      <stop offset="55%" stop-color="#0a1622"/>
      <stop offset="100%" stop-color="#060f17"/>
    </linearGradient>

    <radialGradient id="bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2f7fa0" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#17344a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#17344a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="goldBloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d7a746" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d7a746" stop-opacity="0"/>
    </radialGradient>

    <!-- `userSpaceOnUse` est nécessaire, pas décoratif : le pied et la traverse
         du diapason sont des segments de boîte englobante plate, et un dégradé
         en unités relatives y est indéfini — ils disparaîtraient au rendu. -->
    <linearGradient id="fork" gradientUnits="userSpaceOnUse" x1="850" y1="228" x2="850" y2="700">
      <stop offset="0%" stop-color="#f0c877"/>
      <stop offset="70%" stop-color="#d7a746"/>
      <stop offset="100%" stop-color="#b0733a"/>
    </linearGradient>

    <!-- Voile de lisibilité : le texte de l'écran se pose à gauche, donc le
         contraste y est renforcé plutôt que laissé au hasard du cadrage. -->
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060f17" stop-opacity="0.90"/>
      <stop offset="34%" stop-color="#060f17" stop-opacity="0.42"/>
      <stop offset="70%" stop-color="#060f17" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#060f17" stop-opacity="0"/>
    </linearGradient>

    <!-- Trame de données. Les points sont réguliers : c'est précisément ce qui
         rend un classement automatique crédible avant qu'on l'ait vérifié. -->
    <pattern id="grain" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="1.5" fill="#c8b98d" fill-opacity="0.30"/>
    </pattern>

    <mask id="focus">
      <rect width="1600" height="1000" fill="black"/>
      <ellipse cx="850" cy="500" rx="620" ry="470" fill="url(#softFocus)"/>
    </mask>
    <radialGradient id="softFocus" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white"/>
      <stop offset="62%" stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#ground)"/>
  <rect width="1600" height="1000" fill="url(#grain)" mask="url(#focus)"/>

  <ellipse cx="850" cy="470" rx="700" ry="560" fill="url(#bloom)"/>
  <ellipse cx="850" cy="300" rx="330" ry="290" fill="url(#goldBloom)"/>

  <!-- Ondes de résonance : concentriques et régulières près de la source,
       de plus en plus ténues en s'éloignant. Rien ne se referme. -->
  <g fill="none" stroke="#2f7fa0" stroke-linecap="round">
    <circle cx="850" cy="470" r="150" stroke-opacity="0.55" stroke-width="1.6"/>
    <circle cx="850" cy="470" r="235" stroke-opacity="0.44" stroke-width="1.5"/>
    <circle cx="850" cy="470" r="330" stroke-opacity="0.34" stroke-width="1.4"/>
    <circle cx="850" cy="470" r="435" stroke-opacity="0.24" stroke-width="1.3"/>
    <circle cx="850" cy="470" r="550" stroke-opacity="0.16" stroke-width="1.2"/>
    <circle cx="850" cy="470" r="675" stroke-opacity="0.09" stroke-width="1.1"/>
    <circle cx="850" cy="470" r="810" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <g fill="none" stroke="#d7a746" stroke-linecap="round">
    <circle cx="850" cy="470" r="192" stroke-opacity="0.34" stroke-width="1.1"/>
    <circle cx="850" cy="470" r="285" stroke-opacity="0.20" stroke-width="1"/>
    <circle cx="850" cy="470" r="382" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- Diapason stylisé : deux branches, un pied, aucun décor. Il donne le la ;
       il ne dit pas ce qui est vrai. -->
  <g stroke="url(#fork)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M796 236 V 430 a 54 54 0 0 0 108 0 V 236" stroke-width="13"/>
    <path d="M850 484 V 690" stroke-width="13"/>
    <path d="M818 690 h 64" stroke-width="13"/>
  </g>
  <g fill="#f0c877">
    <circle cx="796" cy="232" r="8"/>
    <circle cx="904" cy="232" r="8"/>
  </g>

  <!-- Onde émise : nette d'un côté, dégradée de l'autre. L'amplitude ne dit rien
       de la justesse — c'est tout le propos. -->
  <g fill="none" stroke-linecap="round">
    <path d="M120 470 C 300 470 340 386 420 386 C 500 386 540 554 620 554 C 690 554 720 470 780 470"
      stroke="#7a9a55" stroke-opacity="0.42" stroke-width="2.4"/>
    <path d="M920 470 C 1060 470 1120 344 1230 344 C 1380 344 1420 596 1510 596 C 1560 596 1580 470 1600 470"
      stroke="#f0c877" stroke-opacity="0.62" stroke-width="2.8"/>
  </g>

  <!-- Points dispersés : la marge de la trame, là où l'ordre apparent se défait. -->
  <g fill="#c8b98d" fill-opacity="0.30">
    <circle cx="196" cy="182" r="2.4"/><circle cx="322" cy="742" r="2"/><circle cx="146" cy="614" r="1.8"/>
    <circle cx="470" cy="118" r="2.2"/><circle cx="1418" cy="164" r="2.4"/><circle cx="1502" cy="826" r="2"/>
    <circle cx="248" cy="906" r="1.9"/><circle cx="1332" cy="906" r="1.8"/><circle cx="86" cy="366" r="2.1"/>
  </g>

  <rect width="1600" height="1000" fill="url(#veil)"/>
</svg>

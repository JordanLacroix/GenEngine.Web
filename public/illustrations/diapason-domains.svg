<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Composition abstraite : un plan de systèmes sombre où six champs lumineux sont reliés par un réseau de liaisons fines.">
  <title>Les domaines</title>
  <desc>
    Fond de la carte des passages pour « Le Diapason ». Ce n'est pas un territoire :
    c'est un plan de systèmes. Une trame technique, six champs d'intensité reliés par un
    réseau de liaisons, et au centre le diapason en filigrane. Aucun lieu, aucun
    personnage, aucune époque autre que la nôtre. La composition reste volontairement
    désaturée : les seules couleurs franches de l'écran sont les accents que
    l'exploitant donne à ses six portes, et rien ici ne doit leur disputer l'attention.
  </desc>

  <defs>
    <!-- Même famille chromatique que `diapason-resonance.svg` : les deux visuels
         doivent se lire comme un seul système, pas comme deux illustrations. -->
    <linearGradient id="plan-ground" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0c1c2b"/>
      <stop offset="52%" stop-color="#091420"/>
      <stop offset="100%" stop-color="#050d14"/>
    </linearGradient>

    <!-- Trame de plan. Deux pas : 32 px pour la texture, 160 px pour la structure.
         Régulière et impassible — c'est l'ordre apparent d'un système qu'on n'a
         pas encore vérifié. -->
    <pattern id="plan-minor" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 V32 M0 32 H32" fill="none" stroke="#7f9cb4" stroke-opacity="0.11" stroke-width="0.6"/>
    </pattern>
    <pattern id="plan-major" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M160 0 V160 M0 160 H160" fill="none" stroke="#8fb0c6" stroke-opacity="0.16" stroke-width="0.9"/>
    </pattern>

    <!-- La trame s'efface vers les bords : le regard se pose au centre, et les
         angles restent disponibles pour le texte de l'interface. -->
    <radialGradient id="plan-falloff" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="white"/>
      <stop offset="58%" stop-color="white" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="plan-mask">
      <rect width="1536" height="1024" fill="black"/>
      <ellipse cx="768" cy="512" rx="880" ry="640" fill="url(#plan-falloff)"/>
    </mask>

    <!-- Champ de domaine. Neutre à dessein : le halo situe une porte sans lui
         imposer de teinte, puisque la variable `door-accent` en pose déjà une
         par-dessus. -->
    <radialGradient id="domain-field" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3f8fae" stop-opacity="0.30"/>
      <stop offset="46%" stop-color="#255a78" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#17344a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="hub-bloom" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d7a746" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#d7a746" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#d7a746" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="plan-veil" x1="0" y1="0" x2="0.45" y2="1">
      <stop offset="0%" stop-color="#050d14" stop-opacity="0.62"/>
      <stop offset="38%" stop-color="#050d14" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#050d14" stop-opacity="0.50"/>
    </linearGradient>

    <radialGradient id="plan-vignette" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#050d14" stop-opacity="0"/>
      <stop offset="62%" stop-color="#050d14" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#050d14" stop-opacity="0.72"/>
    </radialGradient>

    <!-- Empreinte de domaine : un octogone, pas un hexagone. La forme évoque un
         emplacement de composant sur un plan, pas une case de jeu de plateau. -->
    <g id="domain-mark">
      <path d="M-46 -78 H46 L78 -46 V46 L46 78 H-46 L-78 46 V-46 Z"
        fill="none" stroke="#9dbdd2" stroke-opacity="0.30" stroke-width="1.4"/>
      <path d="M-30 -104 H30 M-30 104 H30 M-104 -30 V30 M104 -30 V30"
        fill="none" stroke="#9dbdd2" stroke-opacity="0.16" stroke-width="1.1" stroke-linecap="round"/>
      <circle r="122" fill="none" stroke="#3f8fae" stroke-opacity="0.14" stroke-width="1"/>
    </g>
  </defs>

  <rect width="1536" height="1024" fill="url(#plan-ground)"/>
  <g mask="url(#plan-mask)">
    <rect width="1536" height="1024" fill="url(#plan-minor)"/>
    <rect width="1536" height="1024" fill="url(#plan-major)"/>
  </g>

  <!-- Ondes de résonance, reprises de l'illustration d'accueil : le même signal
       traverse le plan. Très basses opacités — elles structurent sans peser. -->
  <g fill="none" stroke="#2f7fa0" stroke-opacity="0.16">
    <circle cx="768" cy="512" r="180" stroke-width="1.3"/>
    <circle cx="768" cy="512" r="300" stroke-width="1.2"/>
    <circle cx="768" cy="512" r="440" stroke-width="1.1"/>
    <circle cx="768" cy="512" r="600" stroke-width="1"/>
    <circle cx="768" cy="512" r="780" stroke-width="0.9"/>
  </g>

  <ellipse cx="768" cy="512" rx="560" ry="440" fill="url(#hub-bloom)"/>

  <!-- Réseau : un anneau de liaisons entre domaines voisins, plus une prise
       centrale par domaine. Topologie, pas géographie. -->
  <g fill="none" stroke="#5fa3c0" stroke-opacity="0.34" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M768 268 L1200 360 L1240 700 L830 800 L420 716 L392 430 Z"/>
  </g>
  <g fill="none" stroke="#5fa3c0" stroke-opacity="0.18" stroke-width="1.2" stroke-dasharray="7 11" stroke-linecap="round">
    <path d="M768 268 L768 512 M1200 360 L768 512 M1240 700 L768 512
             M830 800 L768 512 M420 716 L768 512 M392 430 L768 512"/>
  </g>

  <!-- Six champs, six empreintes. Leurs centres sont exactement les ancres de
       `worldDoorAnchors` : la composition et le placement des portes sont écrits
       ensemble, pas ajustés l'un après l'autre. -->
  <g>
    <ellipse cx="768" cy="268" rx="230" ry="200" fill="url(#domain-field)"/>
    <ellipse cx="1200" cy="360" rx="230" ry="200" fill="url(#domain-field)"/>
    <ellipse cx="1240" cy="700" rx="230" ry="200" fill="url(#domain-field)"/>
    <ellipse cx="830" cy="800" rx="230" ry="200" fill="url(#domain-field)"/>
    <ellipse cx="420" cy="716" rx="230" ry="200" fill="url(#domain-field)"/>
    <ellipse cx="392" cy="430" rx="230" ry="200" fill="url(#domain-field)"/>
  </g>
  <g>
    <use href="#domain-mark" x="768" y="268"/>
    <use href="#domain-mark" x="1200" y="360"/>
    <use href="#domain-mark" x="1240" y="700"/>
    <use href="#domain-mark" x="830" y="800"/>
    <use href="#domain-mark" x="420" y="716"/>
    <use href="#domain-mark" x="392" y="430"/>
  </g>

  <!-- Diapason en filigrane au centre : la même forme que l'accueil, réduite à
       un repère de plan. Il donne le la ; il ne dit pas ce qui est vrai. -->
  <g stroke="#d7a746" stroke-opacity="0.30" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
    <path d="M742 424 V520 a 26 26 0 0 0 52 0 V424"/>
    <path d="M768 546 V626"/>
    <path d="M752 626 h 32"/>
  </g>
  <g fill="#d7a746" fill-opacity="0.34">
    <circle cx="742" cy="421" r="4.5"/>
    <circle cx="794" cy="421" r="4.5"/>
  </g>
  <circle cx="768" cy="512" r="112" fill="none" stroke="#d7a746" stroke-opacity="0.14" stroke-width="1.2"/>

  <!-- Marques de données le long des liaisons : le trafic d'un système qui
       tourne, sans qu'on sache encore ce qu'il décide. -->
  <g fill="#c8b98d" fill-opacity="0.34">
    <circle cx="984" cy="314" r="2.4"/><circle cx="1220" cy="530" r="2.2"/>
    <circle cx="1035" cy="750" r="2.3"/><circle cx="625" cy="758" r="2.1"/>
    <circle cx="406" cy="573" r="2.2"/><circle cx="580" cy="349" r="2.4"/>
    <circle cx="196" cy="168" r="2"/><circle cx="1352" cy="182" r="1.9"/>
    <circle cx="148" cy="880" r="1.8"/><circle cx="1408" cy="898" r="2"/>
    <circle cx="1470" cy="512" r="1.7"/><circle cx="72" cy="470" r="1.7"/>
  </g>

  <rect width="1536" height="1024" fill="url(#plan-veil)"/>
  <rect width="1536" height="1024" fill="url(#plan-vignette)"/>
</svg>
